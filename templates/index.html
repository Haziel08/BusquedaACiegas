<!DOCTYPE html>
<html>
<head>
    <title>Tarea: Búsqueda a Ciegas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f4f4f9; }
        header { background: #002b7a; color: #f2c100; padding: 15px; text-align: center; }
        .container { display: flex; flex: 1; overflow: hidden; }
        #grafo { flex: 2; background: white; border-right: 2px solid #002b7a; }
        #panel { flex: 1; padding: 20px; background: #fff; overflow-y: auto; display: flex; flex-direction: column; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        .btn-blue { background: #002b7a; color: white; border: none; cursor: pointer; }
        .btn-gold { background: #f2c100; color: #002b7a; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; cursor: default; }
        #log { flex-grow: 1; background: #f8f8f8; border: 1px solid #ddd; padding: 10px; font-family: monospace; white-space: pre-wrap; font-size: 13px; }
        .tag-del { color: red; text-decoration: line-through; }
        .solucion { color: green; font-weight: bold; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>
</head>
<body>
    <header><h1>Tarea 1: Búsqueda a Ciegas - Inteligencia Artificial</h1></header>
    <div class="container">
        <div id="grafo"></div>
        <div id="panel">
            <div class="controls">
                <label>Inicio:</label><select id="selInicio"></select>
                <label>Meta:</label><select id="selMeta"></select>
                <button class="btn-blue" onclick="getPasos('BFS')">Amplitud</button>
                <button class="btn-blue" onclick="getPasos('DFS')">Profundidad</button>
                <button id="btnPaso" class="btn-gold" onclick="renderPaso()" disabled>Paso ></button>
                <button id="btnAuto" class="btn-gold" onclick="toggleAuto()" disabled>Auto Play ▶</button>
            </div>
            <div id="log">Selecciona los nodos e inicia un algoritmo...</div>
        </div>
    </div>

    <script>
        let listadoPasos = [];
        let indexActual = 0;
        let timer = null;
        let nodesVis = new vis.DataSet();
        let edgesVis = new vis.DataSet();

        window.onload = async () => {
            const res = await fetch('/nodos');
            const lista = await res.json();
            const selI = document.getElementById('selInicio');
            const selM = document.getElementById('selMeta');
            lista.forEach(n => {
                selI.add(new Option(n, n));
                selM.add(new Option(n, n));
                nodesVis.add({id: n, label: n, color: '#97c2fc'});
            });
            selI.value = "Entrada"; selM.value = "Bodega";

            // Definición de conexiones manual para el grafo visual
            const links = [
                {from:'Entrada',to:'Sala'},{from:'Entrada',to:'Garage'},{from:'Sala',to:'Estudio'},
                {from:'Sala',to:'Comedor'},{from:'Sala',to:'Garage'},{from:'Sala',to:'Pasillo'},
                {from:'Estudio',to:'Oficina'},{from:'Oficina',to:'Pasillo'},{from:'Comedor',to:'Cocina'},
                {from:'Comedor',to:'Pasillo'},{from:'Cocina',to:'Patio'},{from:'Cocina',to:'Lavandería'},
                {from:'Pasillo',to:'Oficina'},{from:'Pasillo',to:'Rec1'},{from:'Pasillo',to:'Rec2'},
                {from:'Pasillo',to:'Baño1'},{from:'Pasillo',to:'Escaleras'},{from:'Rec1',to:'Lavandería'},
                {from:'Rec2',to:'Baño2'},{from:'Patio',to:'Garage'},{from:'Patio',to:'Lavandería'},
                {from:'Patio',to:'Terraza'},{from:'Lavandería',to:'Bodega'},{from:'Escaleras',to:'Terraza'}
            ];
            edgesVis.add(links);
            new vis.Network(document.getElementById('grafo'), {nodes: nodesVis, edges: edgesVis}, {physics:true});
        };

        async function getPasos(modo) {
            stopAuto();
            indexActual = 0;
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ modo, inicio: document.getElementById('selInicio').value, meta: document.getElementById('selMeta').value })
            });
            listadoPasos = await res.json();
            document.getElementById('btnPaso').disabled = false;
            document.getElementById('btnAuto').disabled = false;
            renderPaso();
        }

        function renderPaso() {
            if (indexActual >= listadoPasos.length) { stopAuto(); return; }
            
            const [open, actual, close, ruta] = listadoPasos[indexActual];
            
            // Log de OPEN y CLOSE
            let html = "<b>--- OPEN ---</b>\n";
            // Mostramos los nodos en OPEN, tachando solo los que ya están en CLOSE en este paso
            open.slice().reverse().forEach(item => {
                const tachado = close.includes(item.nodo);
                const linea = `| ${item.nodo}(${item.padre || 'Root'})\n`;
                html += tachado ? `<span class="tag-del">${linea}</span>` : linea;
            });
            html += `\n<b>--- CLOSE ---</b>\n${close.join(', ')}`;
            
            if (ruta) {
                html += `\n\n<div class="solucion">✔ SOLUCIÓN:\n${ruta.join(' -> ')}</div>`;
                stopAuto();
            }
            document.getElementById('log').innerHTML = html;

            // Actualizar colores del grafo
            nodesVis.forEach(n => {
                let col = '#97c2fc';
                if (ruta && ruta.includes(n.id)) col = '#2ecc71'; // Verde
                else if (close.includes(n.id)) col = '#f39c12'; // Naranja
                else if (n.id === actual.nodo) col = '#f2c100'; // Amarillo (Actual)
                nodesVis.update({id: n.id, color: col});
            });

            indexActual++;
        }

        function toggleAuto() {
            if (timer) stopAuto();
            else {
                document.getElementById('btnAuto').innerText = "Pausar ⏸";
                timer = setInterval(renderPaso, 1000);
            }
        }

        function stopAuto() {
            clearInterval(timer); timer = null;
            document.getElementById('btnAuto').innerText = "Auto Play ▶";
        }
    </script>
</body>
</html>
